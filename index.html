//  MEAL NOTIFICATIONS
// ════════════════════════════════════════════════════════════════
var notifTimers = [];
var notifEnabled = JSON.parse(localStorage.getItem('gl_notif') || 'false');

var MEAL_SCHEDULE = [
  { id:0, time:"06:00", label:"Breakfast — Eggs then Milkshake",
    how:"Step 1: Eat 3 boiled eggs first — protein + fat coat your gut. Step 2: THEN blend and drink your milkshake (milk, banana, cocoa, dates). This order cuts the sugar spike by 35%." },
  { id:1, time:"08:00", label:"Chocolate Overnight Oats",
    how:"Eat cold straight from fridge — do NOT heat. Cold oats digest slower = longer energy, no spike." },
  { id:2, time:"10:30", label:"Orange + Carrots + Hummus",
    how:"Eat carrots + hummus FIRST. Orange last. Fat from hummus buffers the fruit sugar — prevents a mid-morning spike." },
  { id:3, time:"12:00", label:"Chicken Bowl + Rice (Lunch)",
    how:"Eat in order: mixed veg first → chicken → sweet potato → rice LAST. Fibre before carbs cuts spike by ~35%." },
  { id:4, time:"15:45", label:"Greek Yogurt + Banana — pre-workout",
    how:"Banana FIRST today — pre-workout exception. You want fast carbs hitting now before gym. Yogurt after. Gym in 45 min." },
  { id:5, time:"16:00", label:"Mr. Hyde Pre-workout",
    how:"Take 2 scoops now. Gym starts in 30 min. Do not eat anything heavy between now and training." },
  { id:6, time:"18:30", label:"Protein Shake + Creatine",
    how:"Mix 5g creatine into shake. Drink immediately post-workout. This window is your best muscle recovery hit of the day." },
  { id:7, time:"19:30", label:"Chicken Bowl + Rice (Dinner)",
    how:"Same order as lunch — veg first, chicken second, rice last. Eat slowly — this is your recovery meal, not fuel." },
  { id:8, time:"19:00", label:"Kirkland Mixed Nuts",
    how:"Eat these before your protein shake if possible. The fat slightly slows the whey insulin spike — better at this hour." }
];

function initNotifications() {
  renderNotifToggle();
  if (notifEnabled) scheduleAllNotifs();
}

function renderNotifToggle() {
  var el = document.getElementById('notifToggleWrap');
  if (!el) return;
  var supported = ('Notification' in window);
  var granted   = supported && Notification.permission === 'granted';
  el.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1rem;border-bottom:1px solid var(--border)">' +
      '<div>' +
        '<div style="font-size:0.82rem;font-weight:500">Meal Reminders</div>' +
        '<div style="font-family:\'DM Mono\',monospace;font-size:0.58rem;color:var(--muted);margin-top:2px">' +
          (supported ? (granted ? 'Permission granted' : 'Permission needed') : 'Not supported on this browser') +
        '</div>' +
      '</div>' +
      (supported ?
        '<button onclick="toggleNotif()" style="font-family:\'DM Mono\',monospace;font-size:0.62rem;letter-spacing:0.08em;padding:0.32rem 0.75rem;border:1px solid ' +
          (notifEnabled ? 'var(--accent)' : 'var(--border)') + ';background:' +
          (notifEnabled ? 'var(--accent)' : 'transparent') + ';color:' +
          (notifEnabled ? '#000' : 'var(--muted)') + ';cursor:pointer">' +
          (notifEnabled ? 'ON' : 'OFF') +
        '</button>' : '') +
    '</div>';
}

function toggleNotif() {
  if (Notification.permission === 'denied') {
    showToast('Notifications blocked — enable in iPhone Settings → Safari');
    return;
  }
  if (!notifEnabled) {
    Notification.requestPermission().then(function(result) {
      if (result === 'granted') {
        notifEnabled = true;
        localStorage.setItem('gl_notif', 'true');
        scheduleAllNotifs();
        showToast('Meal reminders ON ✓');
      } else {
        showToast('Permission denied');
      }
      renderNotifToggle();
    });
  } else {
    notifEnabled = false;
    localStorage.setItem('gl_notif', 'false');
    clearAllNotifTimers();
    showToast('Meal reminders OFF');
    renderNotifToggle();
  }
}

function scheduleAllNotifs() {
  clearAllNotifTimers();
  var now = new Date();
  MEAL_SCHEDULE.forEach(function(meal) {
    var parts = meal.time.split(':');
    var target = new Date();
    target.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
    var ms = target - now;
    if (ms < 0) ms += 24 * 60 * 60 * 1000; // next day if already passed
    var t = setTimeout(function() {
      fireNotif(meal);
      // Reschedule for next day
      var t2 = setTimeout(function() { if (notifEnabled) scheduleAllNotifs(); }, 1000);
      notifTimers.push(t2);
    }, ms);
    notifTimers.push(t);
  });
}

function fireNotif(meal) {
  if (!notifEnabled || Notification.permission !== 'granted') return;
  new Notification('🍽 Time to eat — ' + meal.label, {
    body: meal.how,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230a0a0a"/><text y=".9em" font-size="80" x="10">💪</text></svg>',
    badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23c8f03c"/></svg>',
    tag: 'meal-' + meal.id,
    requireInteraction: true
  });
}

function clearAllNotifTimers() {
  notifTimers.forEach(function(t) { clearTimeout(t); });
  notifTimers = [];
}

// ════════════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════════════
var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2000);
}
</script>
