<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GrindLog">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0a'/><text y='.9em' font-size='80' x='10'>💪</text></svg>">
<title>Aesthetic Workout Log</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #222222;
  --accent: #c8f03c;
  --accent2: #ff5a36;
  --text: #f0f0f0;
  --muted: #555555;
  --push: #a78bfa;
  --pull: #60a5fa;
  --arms: #fb923c;
  --rest: #6b7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  padding: 1.25rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1rem;
}
.header-left h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 7vw, 3.5rem);
  letter-spacing: 0.04em;
  line-height: 0.9;
  color: var(--accent);
}
.header-left .subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}
/* ── MAIN SCROLL ── */
.main-scroll { padding-bottom: 72px; }

/* ── MAIN VIEWS ── */
.main-view { display: none; }
.main-view.active { display: block; }

/* ── PILL SUB-TABS ── */
.pill-tabs {
  display: flex;
  gap: 0.4rem;
  padding: 0.75rem 1rem 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.pill-tabs::-webkit-scrollbar { display: none; }
.pill-tab {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.28rem 0.75rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: none;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.pill-tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }
.pill-tab:hover:not(.active) { color: var(--text); border-color: var(--muted); }

/* ── SUB-VIEWS ── */
.sub-view { display: none; padding: 0.9rem 1rem 1.5rem; }
.sub-view.active { display: block; }

/* ── SESSION HEADER ── */
.today-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.9rem;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.session-type {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  letter-spacing: 0.05em;
}
.session-type.push { color: var(--push); }
.session-type.pull { color: var(--pull); }
.session-type.arms { color: var(--arms); }
.session-type.rest { color: var(--rest); }
.type-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  padding: 0.18rem 0.48rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 2px;
}
.type-badge.push { background: rgba(167,139,250,0.15); color: var(--push); border: 1px solid rgba(167,139,250,0.3); }
.type-badge.pull { background: rgba(96,165,250,0.15); color: var(--pull); border: 1px solid rgba(96,165,250,0.3); }
.type-badge.arms { background: rgba(251,146,60,0.15); color: var(--arms); border: 1px solid rgba(251,146,60,0.3); }
.type-badge.rest { background: rgba(107,114,128,0.15); color: var(--rest); border: 1px solid rgba(107,114,128,0.3); }

.progress-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-align: right;
  margin-bottom: 0.3rem;
}
.progress-bar-wrap { background: var(--border); height: 3px; margin-bottom: 1rem; }
.progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }

/* ── SECTION LABEL ── */
.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 1.1rem 0 0.45rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border);
}

/* ── EXERCISE CARDS ── */
.exercise-card {
  background: var(--surface);
  border: 1px solid var(--border);
  margin-bottom: 0.45rem;
  overflow: hidden;
  transition: border-color 0.2s;
}
.exercise-card.done { border-color: #1e3a0a; background: #0d1f06; }
.exercise-row {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.65rem 0.8rem;
}
.check-btn {
  width: 20px;
  height: 20px;
  border: 1.5px solid var(--muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  cursor: pointer;
  transition: all 0.2s;
}
.exercise-card.done .check-btn { background: var(--accent); border-color: var(--accent); }
.check-icon { display: none; width: 11px; height: 11px; }
.exercise-card.done .check-icon { display: block; }
.exercise-name {
  flex: 1;
  font-size: 0.86rem;
  font-weight: 500;
  transition: color 0.2s;
  min-width: 0;
}
.exercise-card.done .exercise-name { color: var(--muted); text-decoration: line-through; }
.sets-reps {
  font-family: 'DM Mono', monospace;
  font-size: 0.66rem;
  color: var(--accent);
  letter-spacing: 0.04em;
  white-space: nowrap;
  flex-shrink: 0;
}
.expand-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  width: 24px;
  height: 24px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
.expand-btn.open { color: var(--accent); border-color: var(--accent); }

/* ── SET BUTTONS ROW ── */
.set-buttons-row {
  display: none;
  padding: 0.45rem 0.8rem;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  gap: 0.4rem;
  overflow-x: auto;
  scrollbar-width: none;
  flex-wrap: nowrap;
  align-items: center;
}
.set-buttons-row::-webkit-scrollbar { display: none; }
.set-buttons-row.open { display: flex; }
.set-pill {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.05em;
  padding: 0.28rem 0.7rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.2s;
}
.set-pill:hover { border-color: var(--muted); }
.set-pill.active-set { border-color: var(--accent); color: var(--accent); }
.set-pill.saved-set { background: var(--accent); color: #000; border-color: var(--accent); }
.done-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  padding: 0.28rem 0.9rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
}
.done-btn:hover { border-color: var(--accent); color: var(--accent); }
.done-btn.completed { background: var(--accent); color: #000; border-color: var(--accent); cursor: default; }

/* ── INLINE SET FORM ── */
.set-form {
  display: none;
  padding: 0.7rem 0.8rem 0.8rem;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}
.set-form.open { display: block; }
.set-form-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.sfl {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 0.2rem;
}
.sf-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
.set-form input, .set-form textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  padding: 0.38rem 0.5rem;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.set-form input:focus, .set-form textarea:focus { border-color: var(--accent); }
.set-form input[type=number] { width: 88px; flex-shrink: 0; }
.save-set-btn {
  background: var(--accent);
  color: #000;
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.42rem 1rem;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.2s;
  margin-top: 0.25rem;
}
.save-set-btn:hover { opacity: 0.85; }

/* ── WORKOUT HISTORY ── */
.history-date-card {
  background: var(--surface);
  border: 1px solid var(--border);
  margin-bottom: 0.45rem;
  overflow: hidden;
}
.history-date-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.65rem 0.8rem;
  cursor: pointer;
  user-select: none;
}
.history-date-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--text);
  font-weight: 500;
  flex: 1;
}
.mini-prog-bar { width: 54px; height: 4px; background: var(--border); flex-shrink: 0; border-radius: 2px; overflow: hidden; }
.mini-prog-fill { height: 100%; background: var(--accent); border-radius: 2px; }
.history-count { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.history-date-body {
  display: none;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  padding: 0.65rem 0.8rem;
}
.history-date-body.open { display: block; }
.h-ex-name { font-size: 0.86rem; font-weight: 500; margin-top: 0.55rem; margin-bottom: 0.2rem; }
.h-ex-name:first-child { margin-top: 0; }
.h-set-line { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--accent); padding-left: 0.5rem; margin-bottom: 0.12rem; }
.h-set-notes { font-size: 0.72rem; color: var(--muted); font-style: italic; padding-left: 0.5rem; margin-bottom: 0.1rem; }
.h-auto-done { font-family: 'DM Mono', monospace; font-size: 0.63rem; color: #4ade80; padding-left: 0.5rem; }

.history-del-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 0.6rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  margin-left: 0.25rem;
}
.history-del-btn:hover { border-color: var(--accent2); color: var(--accent2); }

/* ── STATS ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.5rem;
  margin-bottom: 1.1rem;
}
.stat-card { background: var(--surface); border: 1px solid var(--border); padding: 0.85rem; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; color: var(--accent); line-height: 1; }
.stat-label { font-family: 'DM Mono', monospace; font-size: 0.56rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 0.2rem; }
.bar-chart { margin-top: 0.6rem; }
.bar-row { display: flex; align-items: center; gap: 0.55rem; margin-bottom: 0.45rem; }
.bar-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); width: 80px; flex-shrink: 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.bar-track { flex: 1; background: var(--border); height: 5px; }
.bar-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; }
.bar-val { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--accent); min-width: 24px; text-align: right; }

/* ── MEALS TAB ── */
.macro-bars-section {
  padding: 0.9rem 1rem 0.75rem;
  border-bottom: 1px solid var(--border);
}
.macro-bar-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
.macro-bar-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); width: 58px; flex-shrink: 0; }
.macro-bar-track { flex: 1; background: var(--border); height: 6px; border-radius: 3px; overflow: hidden; }
.macro-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s, background 0.3s; max-width: 100%; }
.macro-bar-fill.over { background: var(--accent2); }
.macro-bar-nums { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--text); white-space: nowrap; min-width: 82px; text-align: right; }

.meals-list { padding: 0.7rem 1rem 1rem; }

/* ── MEAL CARD ── */
.meal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  margin-bottom: 0.55rem;
  overflow: hidden;
}
.meal-card-header {
  display: flex;
  align-items: flex-start;
  padding: 0.7rem 0.85rem 0.5rem;
  cursor: pointer;
  user-select: none;
  gap: 0.5rem;
}
.meal-card-title { font-size: 0.88rem; font-weight: 500; flex: 1; line-height: 1.3; }
.meal-card-time { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; padding-top: 0.15rem; }
.meal-chevron { font-size: 0.65rem; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; padding-top: 0.15rem; }
.meal-card.expanded .meal-chevron { transform: rotate(180deg); }
.meal-macro-line { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); padding: 0 0.85rem 0.45rem; }
.meal-note-line { font-size: 0.72rem; color: var(--muted); font-style: italic; padding: 0 0.85rem 0.4rem; line-height: 1.4; }
.meal-ingredients { display: none; padding: 0.45rem 0.85rem; border-top: 1px solid var(--border); background: var(--surface2); }
.meal-card.expanded .meal-ingredients { display: block; }
.ingr-line { display: flex; justify-content: space-between; align-items: flex-start; padding: 0.28rem 0; border-bottom: 1px solid var(--border); gap: 0.5rem; }
.ingr-line:last-child { border-bottom: none; }
.ingr-name { font-size: 0.76rem; color: var(--text); flex: 1; line-height: 1.35; }
.ingr-macros { font-family: 'DM Mono', monospace; font-size: 0.57rem; color: var(--muted); white-space: nowrap; text-align: right; flex-shrink: 0; }
.meal-action-row { padding: 0.5rem 0.85rem 0.7rem; }
.mark-eaten-btn {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.48rem;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.2s;
}
.mark-eaten-btn:hover { opacity: 0.85; }
.eaten-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: #0d2a15;
  border: 1px solid #1a4a28;
  padding: 0.42rem 0.75rem;
}
.eaten-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: #4ade80; flex: 1; }
.undo-link { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); text-decoration: underline; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

/* ── SUPPLEMENT CARD ── */
.supp-card {
  background: #0d0d0d;
  border: 1px solid #2a2a2a;
  border-left: 3px solid var(--push);
  margin-bottom: 0.55rem;
  padding: 0.7rem 0.85rem;
}
.supp-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; flex-wrap: wrap; }
.supp-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.54rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.14rem 0.42rem;
  border-radius: 999px;
  background: rgba(167,139,250,0.15);
  color: var(--push);
  border: 1px solid rgba(167,139,250,0.3);
  flex-shrink: 0;
}
.supp-name { font-size: 0.84rem; font-weight: 500; }
.supp-dose { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); }
.supp-macros { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); margin-bottom: 0.25rem; }
.supp-note { font-size: 0.7rem; color: var(--muted); font-style: italic; margin-bottom: 0.45rem; line-height: 1.4; }
.supp-action { display: flex; align-items: center; gap: 0.5rem; }
.supp-btn {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  padding: 0.35rem 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.supp-btn:hover { border-color: var(--push); color: var(--push); }
.supp-btn.taken { background: rgba(167,139,250,0.1); color: var(--push); border-color: rgba(167,139,250,0.3); cursor: default; }
.creatine-badge {
  display: inline-block;
  margin-bottom: 0.35rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.56rem;
  letter-spacing: 0.06em;
  padding: 0.14rem 0.48rem;
  border-radius: 999px;
  background: rgba(96,165,250,0.1);
  color: var(--pull);
  border: 1px solid rgba(96,165,250,0.3);
}

/* ── DAILY SUMMARY ── */
.daily-summary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  padding: 0.9rem 0.85rem;
  margin-top: 0.3rem;
}
.daily-summary-title { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.65rem; }
.daily-cal-big { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--accent); line-height: 1; }
.daily-cal-goal { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); margin-bottom: 0.65rem; }
.daily-status { font-size: 0.8rem; color: var(--text); margin-bottom: 0.5rem; line-height: 1.4; }
.daily-macro-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.daily-macro-item { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); }
.daily-macro-item span { color: var(--text); }

/* ── CALENDAR TAB ── */
.calendar-nav {
  display: flex;
  align-items: center;
  padding: 0.85rem 1rem 0.55rem;
  gap: 0.5rem;
}
.cal-nav-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 1rem;
  width: 32px;
  height: 32px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.cal-month-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: 0.08em; color: var(--text); flex: 1; text-align: center; }
.cal-grid-wrap { padding: 0 1rem 0.75rem; }
.cal-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 0.2rem; }
.cal-dow { font-family: 'DM Mono', monospace; font-size: 0.56rem; color: var(--muted); text-align: center; padding: 0.18rem 0; text-transform: uppercase; letter-spacing: 0.06em; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-cell {
  min-height: 50px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 0.28rem 0.28rem 0.22rem;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 3px;
  transition: border-color 0.15s;
  position: relative;
  overflow: hidden;
}

function getCustomMeals() { return JSON.parse(localStorage.getItem('gl_meal_custom') || '{}'); }
function setCustomMeals(o){ localStorage.setItem('gl_meal_custom', JSON.stringify(o)); }

function getMealMacros(meal) {
  var custom = getCustomMeals()[meal.id];
  if (!custom || !custom.ingredients || !custom.ingredients.length) {
    return { kcal: meal.kcal, p: meal.p, c: meal.c, f: meal.f,
             ingredients: meal.ingredients || [] };
  }
  var kcal=0, p=0, c=0, f=0;
  custom.ingredients.forEach(function(ing) {
    var w = parseFloat(ing.weight) || 0;
    kcal += (w / 100) * (parseFloat(ing.kcal100) || 0);
    p    += (w / 100) * (parseFloat(ing.p100)    || 0);
    c    += (w / 100) * (parseFloat(ing.c100)    || 0);
    f    += (w / 100) * (parseFloat(ing.f100)    || 0);
  });
  return { kcal: Math.round(kcal*10)/10, p: Math.round(p*10)/10,
           c: Math.round(c*10)/10,       f: Math.round(f*10)/10,
           ingredients: custom.ingredients };
}

// ── LOCAL DATE HELPERS (MST = UTC-7, MDT = UTC-6) ──
function localDateStr(d) {
  // Use local year/month/day — not UTC — so date never flips early
  var y  = d.getFullYear();
  var mo = String(d.getMonth() + 1).padStart(2, '0');
  var dy = String(d.getDate()).padStart(2, '0');
  return y + '-' + mo + '-' + dy;
}
function todayKey() { return localDateStr(new Date()); }

// Active logging date — defaults to today, changes when user picks a different day

// Returns the active session for a date — custom if exists, else SCHEDULE
function getSessionForDate(date) {
  var d   = new Date(date + 'T12:00:00');
  var dow = d.getDay();
  var custom = getCustomWorkout(date);
  if (custom) {
    return { name: custom.name || SCHEDULE[dow].name,
             type: custom.type || SCHEDULE[dow].type,
             label: custom.label || SCHEDULE[dow].label,
             sections: custom.sections,
             isCustom: true };
  }
  return Object.assign({}, SCHEDULE[dow], { isCustom: false });
}

function switchSubTab(main, sub, btn) {
  const prefix = 'sub-' + main + '-';
  document.querySelectorAll('[id^="' + prefix + '"]').forEach(v => v.classList.remove('active'));
  btn.closest('.pill-tabs').querySelectorAll('.pill-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(prefix + sub).classList.add('active');
  btn.classList.add('active');
  if (sub === 'week') renderWeekView();
}

//  WEEK VIEW — all 6 days
// ════════════════════════════════════════════════════════════════
const WEEK_DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function renderWeekView() {
  var container = document.getElementById('weekView');
  var todayDow  = new Date().getDay();
  // Order: Mon(1) Tue(2) Wed(3) Thu(4) Fri(5) Sat(6) Sun(0)
  var order = [1,2,3,4,5,6,0];
  var html = '';

  order.forEach(function(dow) {
    var session  = SCHEDULE[dow];
    var dayName  = WEEK_DAY_NAMES[dow];
    var isToday  = (dow === todayDow);
    var typeClass = session ? session.type : 'rest';

    html += '<div class="week-day-block' +
      (isToday ? ' today-block' : '') +
      (isToday ? ' expanded' : '') +
      '" id="wdb-' + dow + '">' +
      '<div class="week-day-header" onclick="toggleWeekDay(' + dow + ')">' +
        '<div class="week-day-name ' + typeClass + '">' + dayName + '</div>' +
        (isToday ? '<span class="week-today-tag">Today</span>' : '') +
        '<div class="week-session-label">' +
          (session && session.name !== 'REST DAY' ? session.name + ' · ' + session.label : 'Rest · Recovery') +
        '</div>' +
        '<span class="week-chevron">&#9660;</span>' +
      '</div>' +
      '<div class="week-day-body">';

    if (!session || !session.sections.length) {
      html += '<div class="week-rest-msg">Rest day — recover, stretch, meal prep</div>';
    } else {
      session.sections.forEach(function(sec) {
        html += '<div class="week-section-label">' + sec.name + '</div>';
        sec.exercises.forEach(function(ex) {
          var sr = ex.sets === '—' ? ex.reps : ex.sets + '×' + ex.reps;
          html += '<div class="week-exercise-row">' +
            '<span class="week-ex-name">' + ex.name + '</span>' +
            '<span class="week-ex-sets">' + sr + '</span>' +
          '</div>';
        });
      });
    }

    html += '</div></div>';
  });

  container.innerHTML = html;
}

function toggleWeekDay(dow) {
  var block = document.getElementById('wdb-' + dow);
  if (block) block.classList.toggle('expanded');
}

function renderToday() {
  var date    = activeLogDate;
  var isToday = (date === todayKey());
  var session = getSessionForDate(date);
  var checked = getChecked();
  var sls     = getSetLogs();

  document.getElementById('sessionType').textContent = session.name;
  document.getElementById('sessionType').className   = 'session-type ' + session.type;
  document.getElementById('sessionBadge').innerHTML  =
    '<span class="type-badge ' + session.type + '">' + session.label + '</span>' +
    (session.isCustom ? '<span class="meal-custom-badge">edited</span>' : '') +
    (!isToday ? '<span class="past-day-note">Editing ' + date + '</span>' : '');

  // Edit / done button
  var editBtn = document.getElementById('wkEditBtn');
  if (editBtn) {
    editBtn.textContent = wkEditMode ? 'Done Editing' : 'Edit Workout';
    editBtn.style.background = wkEditMode ? 'var(--accent)' : 'transparent';
    editBtn.style.color      = wkEditMode ? '#000' : 'var(--muted)';
  }

  var list = document.getElementById('exerciseList');
  list.innerHTML = '';

  if (!session.sections.length) {
    list.innerHTML = '<div class="empty-state"><div class="big">ZZZ</div><p>Rest day. Recover, stretch, meal prep.</p></div>';
    document.getElementById('progressLabel').textContent = 'Rest day';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }

  if (wkEditMode) {
    renderWorkoutEditor(session, date, list);
    document.getElementById('progressLabel').textContent = 'Edit mode — changes save per day';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }

  var totalEx = 0, doneEx = 0;
  session.sections.forEach(function(section) {
    var sl = document.createElement('div');
    sl.className = 'section-label';
    sl.textContent = section.name;
    list.appendChild(sl);

    section.exercises.forEach(function(ex) {
      totalEx++;
      var key    = ex.name + '_' + date;
      var isDone = !!checked[key];
      if (isDone) doneEx++;

      var isSimple    = ex.sets === '—';
      var numSets     = isSimple ? 0 : parseInt(ex.sets, 10);
      var setsRepsStr = isSimple ? ex.reps : ex.sets + '×' + ex.reps;

      var card = document.createElement('div');
      card.className    = 'exercise-card' + (isDone ? ' done' : '');
      card.dataset.key  = key;
      card.dataset.name = ex.name;
      card.dataset.sets = ex.sets;
      card.dataset.date = date;
      card.dataset.type = session.type;

      var setPillsHtml = '';
      if (isSimple) {
        var doneStyle = isDone ? ' completed' : '';
        setPillsHtml = '<button class="done-btn' + doneStyle + '" onclick="markSimpleDone(this)">' + (isDone ? 'Done ✓' : 'Done') + '</button>';
      } else {
        for (var i = 1; i <= numSets; i++) {
          var slKey   = ex.name + '__' + date + '__' + i;
          var saved   = sls[slKey];
          var pillCls = saved ? ' saved-set' : '';
          var pillLbl = saved ? ('✓ Set ' + i) : ('Set ' + i);
          setPillsHtml += '<button class="set-pill' + pillCls + '" data-setnum="' + i + '" onclick="openSetForm(this)">' + pillLbl + '</button>';
        }
      }

      card.innerHTML =
        '<div class="exercise-row">' +
          '<button class="check-btn" onclick="toggleCheck(this)">' +
            '<svg class="check-icon" viewBox="0 0 12 12" fill="none" stroke="#000" stroke-width="2"><polyline points="1,6 5,10 11,2"/></svg>' +
          '</button>' +
          '<span class="exercise-name">' + ex.name + '</span>' +
          '<span class="sets-reps">' + setsRepsStr + '</span>' +
          (!isSimple ? '<button class="expand-btn" onclick="toggleSetButtons(this)">+</button>' : '') +
        '</div>' +
        '<div class="set-buttons-row' + (isSimple ? ' open' : '') + '">' + setPillsHtml + '</div>' +
        '<div class="set-form"></div>';

      list.appendChild(card);
    });
  });

  updateProgress(doneEx, totalEx);
}

function toggleSetButtons(btn) {
  var card = btn.closest('.exercise-card');
  var row  = card.querySelector('.set-buttons-row');
  var form = card.querySelector('.set-form');
  var wasOpen = row.classList.contains('open');

  // Close all
  document.querySelectorAll('.set-buttons-row.open').forEach(function(r) {
    r.classList.remove('open');
    var b = r.closest('.exercise-card').querySelector('.expand-btn');
    if (b) { b.textContent = '+'; b.classList.remove('open'); }
  });
  document.querySelectorAll('.set-form.open').forEach(function(f) { f.classList.remove('open'); });

  if (!wasOpen) {
    row.classList.add('open');
    btn.textContent = '−';
    btn.classList.add('open');
  }
}

function openSetForm(pill) {
  var card   = pill.closest('.exercise-card');
  var form   = card.querySelector('.set-form');
  var exName = card.dataset.name;
  var date   = card.dataset.date;
  var setNum = parseInt(pill.dataset.setnum, 10);
  var slKey  = exName + '__' + date + '__' + setNum;
  var sls    = getSetLogs();
  var existing = sls[slKey] || {};

  // Toggle: clicking same open set closes it
  if (form.classList.contains('open') && form.dataset.openSet == setNum) {
    form.classList.remove('open');
    form.dataset.openSet = '';
    card.querySelectorAll('.set-pill').forEach(function(p) { p.classList.remove('active-set'); });
    return;
  }

  // Mark active pill, clear others
  card.querySelectorAll('.set-pill').forEach(function(p) { p.classList.remove('active-set'); });
  pill.classList.add('active-set');
  form.dataset.openSet = setNum;

  form.innerHTML =
    '<div class="set-form-title">SET ' + setNum + '</div>' +
    '<div class="sf-row">' +
      '<div><label class="sfl">Weight (lbs)</label>' +
        '<input type="number" placeholder="e.g. 40" step="0.5" value="' + (existing.weight || '') + '" style="width:88px"></div>' +
      '<div><label class="sfl">Reps done</label>' +
        '<input type="number" placeholder="e.g. 10" value="' + (existing.reps || '') + '" style="width:80px"></div>' +
    '</div>' +
    '<label class="sfl">Notes</label>' +
    '<textarea placeholder="How did it feel?" rows="2" style="resize:vertical;width:100%;margin-bottom:0.4rem">' + (existing.notes || '') + '</textarea>' +
    '<button class="save-set-btn" onclick="saveSet(this)">Save Set</button>';
  form.classList.add('open');
}

function saveSet(btn) {
  var form   = btn.closest('.set-form');
  var card   = form.closest('.exercise-card');
  var exName = card.dataset.name;
  var date   = card.dataset.date;
  var sType  = card.dataset.type;
  var setNum = parseInt(form.dataset.openSet, 10);
  var inputs = form.querySelectorAll('input[type=number]');
  var notes  = form.querySelector('textarea').value.trim();
  var weight = inputs[0].value;
  var reps   = inputs[1].value;

  var slKey = exName + '__' + date + '__' + setNum;
  var sls   = getSetLogs();
  sls[slKey] = { weight: weight || null, reps: reps || null, notes: notes || null, savedAt: new Date().toISOString() };
  setSetLogs(sls);

  // Update pill
  var pill = card.querySelector('.set-pill[data-setnum="' + setNum + '"]');
  if (pill) {
    pill.classList.add('saved-set');
    pill.classList.remove('active-set');
    pill.textContent = '✓ Set ' + setNum;
  }

  // Close form
  form.classList.remove('open');
  form.dataset.openSet = '';
  showToast('Set saved');

  // Check if all sets done
  var totalSets = parseInt(card.dataset.sets, 10);
  var allDone   = true;
  for (var i = 1; i <= totalSets; i++) {
    if (!sls[exName + '__' + date + '__' + i]) { allDone = false; break; }
  }
  if (allDone) autoCompleteExercise(card, exName, date, sType, totalSets, sls);
}

function autoCompleteExercise(card, exName, date, sType, totalSets, sls) {
  var checked = getChecked();
  var key     = exName + '_' + date;
  if (checked[key]) return;
  checked[key] = true;
  setChecked(checked);
  card.classList.add('done');

  var logs    = getLogs();
  var already = logs.findIndex(function(l) { return l.exercise === exName && l.date === date && l.autoLogged; });
  if (already === -1) {
    var parts = [];
    for (var i = 1; i <= totalSets; i++) {
      var s = sls[exName + '__' + date + '__' + i];
      if (s) parts.push((s.weight || '?') + 'lbs×' + (s.reps || '?'));
    }
    logs.unshift({ date:date, exercise:exName, setsReps:parts.join(', '), weight:null, reps:null, notes:null, type:sType, autoLogged:true });
    setLogs(logs);
  }
  showToast('Exercise complete!');
  recalcProgress();
  renderWorkoutHistory();
  renderStats();
}

function markSimpleDone(btn) {
  var card   = btn.closest('.exercise-card');
  var exName = card.dataset.name;
  var date   = card.dataset.date;
  var sType  = card.dataset.type;
  var key    = exName + '_' + date;
  var checked = getChecked();
  if (checked[key]) return;
  checked[key] = true;
  setChecked(checked);
  card.classList.add('done');
  btn.textContent = 'Done ✓';
  btn.classList.add('completed');

  var logs    = getLogs();
  var already = logs.findIndex(function(l) { return l.exercise === exName && l.date === date && l.autoLogged; });
  if (already === -1) {
    logs.unshift({ date:date, exercise:exName, setsReps:'—', weight:null, reps:null, notes:null, type:sType, autoLogged:true });
    setLogs(logs);
  }
  showToast('Exercise complete!');
  recalcProgress();
  renderWorkoutHistory();
  renderStats();
}

function toggleCheck(btn) {
  var card    = btn.closest('.exercise-card');
  var key     = card.dataset.key;
  var exName  = card.dataset.name;
  var date    = card.dataset.date;
  var sType   = card.dataset.type;
  var sReps   = card.querySelector('.sets-reps').textContent;
  var checked = getChecked();
  checked[key] = !checked[key];
  setChecked(checked);
  card.classList.toggle('done', checked[key]);

  if (checked[key]) {
    var logs    = getLogs();
    var already = logs.findIndex(function(l) { return l.exercise === exName && l.date === date && l.autoLogged; });
    if (already === -1) {
      logs.unshift({ date:date, exercise:exName, setsReps:sReps, weight:null, reps:null, notes:null, type:sType, autoLogged:true });
      setLogs(logs);
    }
    showToast('Exercise done ✓');
  } else {
    var logs = getLogs();
    var idx  = logs.findIndex(function(l) { return l.exercise === exName && l.date === date && l.autoLogged; });
    if (idx !== -1) { logs.splice(idx, 1); setLogs(logs); }
    showToast('Unmarked');
  }
  recalcProgress();
  renderWorkoutHistory();
  renderStats();
}

function recalcProgress() {
  var date    = activeLogDate;
  var session = getSessionForDate(date);
  var checked = getChecked();
  var total   = 0, done = 0;
  session.sections.forEach(function(s) {
    s.exercises.forEach(function(ex) {
      total++;
      if (checked[ex.name + '_' + date]) done++;
    });
  });
  updateProgress(done, total);
}

function updateProgress(done, total) {
  var pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total + ' exercises · ' + pct + '%';
}

// ════════════════════════════════════════════════════════════════
//  WORKOUT EDITOR
// ════════════════════════════════════════════════════════════════
function toggleWkEdit() {
  wkEditMode = !wkEditMode;
  renderToday();
}

function renderWorkoutEditor(session, date, container) {
  // Clone sections deeply so we can mutate in editor
  var sections = JSON.parse(JSON.stringify(session.sections));

  function rebuild() {
    container.innerHTML = '';
    sections.forEach(function(sec, si) {
      var isSuperset = sec.name.indexOf('SS') === 0;
      var secDiv = document.createElement('div');
      secDiv.className = 'wk-editor-section';

      var headerHtml =
        '<div class="wk-editor-sec-header">' +
          '<input class="wk-sec-name-input" value="' + esc(sec.name) + '" placeholder="Section name" ' +
            'onchange="wkSecRename(' + si + ', this.value)">' +
          (isSuperset && sec.exercises.length >= 2 ?
            '<button class="wk-break-btn" onclick="wkBreakSuperset(' + si + ')">⇣ Break</button>' : '') +
          (si < sections.length - 1 && !isSuperset ?
            '<button class="wk-merge-btn" onclick="wkMergeSuperset(' + si + ')">⇡ Merge</button>' : '') +
          '<button class="wk-del-sec-btn" onclick="wkDelSection(' + si + ')">&#10005;</button>' +
        '</div>';

      var exHtml = '';
      sec.exercises.forEach(function(ex, ei) {
        exHtml +=
          '<div class="wk-ex-row">' +
            '<input class="wk-ex-name-input" value="' + esc(ex.name) + '" placeholder="Exercise name" ' +
              'onchange="wkExRename(' + si + ',' + ei + ',this.value)">' +
            '<div class="wk-field-wrap">' +
              '<span class="wk-sets-label">Sets</span>' +
              '<input class="wk-sets-input" value="' + esc(ex.sets) + '" placeholder="4" ' +
                'onchange="wkExSets(' + si + ',' + ei + ',this.value)">' +
            '</div>' +
            '<div class="wk-field-wrap">' +
              '<span class="wk-reps-label">Reps</span>' +
              '<input class="wk-reps-input" value="' + esc(ex.reps) + '" placeholder="10" ' +
                'onchange="wkExReps(' + si + ',' + ei + ',this.value)">' +
            '</div>' +
            '<button class="wk-del-ex-btn" onclick="wkDelEx(' + si + ',' + ei + ')">&#10005;</button>' +
          '</div>';
      });

      exHtml += '<button class="wk-add-ex-btn" onclick="wkAddEx(' + si + ')">+ Add exercise</button>';

      secDiv.innerHTML = headerHtml + exHtml;
      container.appendChild(secDiv);
    });

    // Footer buttons
    var footer = document.createElement('div');
    footer.className = 'wk-editor-footer';
    footer.innerHTML =
      '<button class="wk-add-sec-btn" onclick="wkAddSection()">+ Add section</button>' +
      '<button class="wk-reset-btn" onclick="wkReset()">Reset to default</button>';
    container.appendChild(footer);
  }

  // Expose mutation functions on window so inline onclick can reach them
  window.wkSecRename = function(si, val) {
    sections[si].name = val;
    wkSave(sections);
  };
  window.wkBreakSuperset = function(si) {
    var sec = sections[si];
    var newSecs = sec.exercises.map(function(ex) {
      return { name: ex.name, exercises: [ex] };
    });
    sections.splice.apply(sections, [si, 1].concat(newSecs));
    wkSave(sections);
    rebuild();
  };
  window.wkMergeSuperset = function(si) {
    if (si >= sections.length - 1) return;
    var secA = sections[si];
    var secB = sections[si + 1];
    // Count existing SS sections to name correctly
    var ssCount = sections.filter(function(s){ return s.name.indexOf('SS') === 0; }).length + 1;
    var merged = {
      name: 'SS' + ssCount + ' — ' + secA.name + ' + ' + secB.name,
      exercises: secA.exercises.concat(secB.exercises)
    };
    sections.splice(si, 2, merged);
    wkSave(sections);
    rebuild();
  };
  window.wkDelSection = function(si) {
    sections.splice(si, 1);
    wkSave(sections);
    rebuild();
  };
  window.wkExRename = function(si, ei, val) {
    sections[si].exercises[ei].name = val;
    wkSave(sections);
  };
  window.wkExSets = function(si, ei, val) {
    sections[si].exercises[ei].sets = val;
    wkSave(sections);
  };
  window.wkExReps = function(si, ei, val) {
    sections[si].exercises[ei].reps = val;
    wkSave(sections);
  };
  window.wkDelEx = function(si, ei) {
    sections[si].exercises.splice(ei, 1);
    if (!sections[si].exercises.length) sections.splice(si, 1);
    wkSave(sections);
    rebuild();
  };
  window.wkAddEx = function(si) {
    sections[si].exercises.push({ name: '', sets: '3', reps: '10' });
    wkSave(sections);
    rebuild();
  };
  window.wkAddSection = function() {
    sections.push({ name: 'New Section', exercises: [{ name: '', sets: '3', reps: '10' }] });
    wkSave(sections);
    rebuild();
  };
  window.wkReset = function() {
    clearCustomWorkout(activeLogDate);
    wkEditMode = false;
    renderToday();
  };

  rebuild();
}

function wkSave(sections) {
  var date    = activeLogDate;
  var d       = new Date(date + 'T12:00:00');
  var dow     = d.getDay();
  var base    = SCHEDULE[dow];
  setCustomWorkout(date, {
    name: base.name, type: base.type, label: base.label,
    sections: sections
  });
}

function esc(str) {
  return String(str || '').replace(/"/g, '&quot;');
}

function markAllDone() {
  var date    = activeLogDate;
  var session = getSessionForDate(date);
  var checked = getChecked();
  var logs    = getLogs();
  session.sections.forEach(function(s) {
    s.exercises.forEach(function(ex) {
      checked[ex.name + '_' + date] = true;
      var already = logs.findIndex(function(l) { return l.exercise === ex.name && l.date === date && l.autoLogged; });
      if (already === -1) {
        var sr = ex.sets === '—' ? ex.reps : ex.sets + '×' + ex.reps;
        logs.unshift({ date:date, exercise:ex.name, setsReps:sr, weight:null, reps:null, notes:null, type:session.type, autoLogged:true });
      }
    });
  });
  setChecked(checked);
  setLogs(logs);
  renderToday();
  renderWorkoutHistory();
  renderStats();
  showToast('All done!');
}

// ════════════════════════════════════════════════════════════════
//  WORKOUT HISTORY — DATE-GROUPED
// ════════════════════════════════════════════════════════════════
var openHistoryDate = null;

function renderWorkoutHistory() {
  var logs    = getLogs();
  var sls     = getSetLogs();
  var list    = document.getElementById('workoutHistoryList');

  if (!logs.length) {
    list.innerHTML = '<div class="empty-state"><div class="big">0</div><p>No logs yet. Complete a workout to see history.</p></div>';
    return;
  }

  // Group by date
  var byDate = {};
  logs.forEach(function(l) {
    if (!byDate[l.date]) byDate[l.date] = { type: l.type, exercises: {} };
    if (!byDate[l.date].exercises[l.exercise]) byDate[l.date].exercises[l.exercise] = l;
    // Keep type from most recent entry
    if (l.type) byDate[l.date].type = l.type;
  });

  var dates = Object.keys(byDate).sort(function(a,b){ return b.localeCompare(a); });
  var DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var MONS  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function sessionTotal(dateStr) {
    var d   = new Date(dateStr + 'T12:00:00');
    var s   = SCHEDULE[d.getDay()];
    if (!s || !s.sections.length) return 0;
    return s.sections.reduce(function(n, sec) { return n + sec.exercises.length; }, 0);
  }

  list.innerHTML = '';

  // Clear all button at top
  var clearAllDiv = document.createElement('div');
  clearAllDiv.style.cssText = 'display:flex;justify-content:flex-end;margin-bottom:0.75rem';
  clearAllDiv.innerHTML = '<button onclick="clearAllHistory()" style="font-family:var(--font-mono,\'DM Mono\',monospace);font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.28rem 0.65rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s" onmouseover="this.style.borderColor=\'var(--accent2)\';this.style.color=\'var(--accent2)\'" onmouseout="this.style.borderColor=\'var(--border)\';this.style.color=\'var(--muted)\'">Clear All History</button>';
  list.appendChild(clearAllDiv);

  dates.forEach(function(date) {
    var data      = byDate[date];
    var d         = new Date(date + 'T12:00:00');
    var dateLabel = DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + MONS[d.getMonth()];
    var doneCount = Object.keys(data.exercises).length;
    var totCount  = sessionTotal(date) || doneCount;
    var pct       = Math.round((doneCount / totCount) * 100);
    var tc        = data.type || 'rest';
    var tn        = data.type ? data.type.toUpperCase() : '—';

    var bodyHtml = '';
    Object.keys(data.exercises).forEach(function(exName) {
      bodyHtml += '<div class="h-ex-name">' + exName + '</div>';
      var hasSet = false;
      for (var i = 1; i <= 20; i++) {
        var s = sls[exName + '__' + date + '__' + i];
        if (!s) break;
        hasSet = true;
        bodyHtml += '<div class="h-set-line">Set ' + i + ' — ' + (s.weight || '?') + 'lbs × ' + (s.reps || '?') + ' reps</div>';
        if (s.notes) bodyHtml += '<div class="h-set-notes">' + s.notes + '</div>';
      }
      if (!hasSet) bodyHtml += '<div class="h-auto-done">Completed ✓</div>';
    });

    var card = document.createElement('div');
    card.className = 'history-date-card';
    card.innerHTML =
      '<div class="history-date-header" onclick="toggleHistoryCard(\'' + date + '\',this)">' +
        '<div class="history-date-label">' + dateLabel + '</div>' +
        '<span class="type-badge ' + tc + '" style="font-size:0.55rem">' + tn + '</span>' +
        '<div class="mini-prog-bar"><div class="mini-prog-fill" style="width:' + Math.min(pct,100) + '%"></div></div>' +
        '<div class="history-count">' + doneCount + ' / ' + totCount + ' · ' + pct + '%</div>' +
        '<button class="history-del-btn" onclick="event.stopPropagation();deleteHistoryDate(\'' + date + '\')">&#10005;</button>' +
      '</div>' +
      '<div class="history-date-body' + (openHistoryDate === date ? ' open' : '') + '">' + bodyHtml + '</div>';
    list.appendChild(card);
  });
}

function deleteHistoryDate(date) {
  // Remove logs for this date
  var logs = getLogs().filter(function(l){ return l.date !== date; });
  setLogs(logs);

  // Remove checked state for this date
  var checked = getChecked();
  Object.keys(checked).forEach(function(k){
    if (k.endsWith('_' + date)) delete checked[k];
  });
  setChecked(checked);

  // Remove set logs for this date
  var sls = getSetLogs();
  Object.keys(sls).forEach(function(k){
    if (k.includes('__' + date + '__')) delete sls[k];
  });
  setSetLogs(sls);

  // Remove meal log for this date
  localStorage.removeItem('gl_meals_' + date);

  // Remove custom workout for this date
  clearCustomWorkout(date);

  renderWorkoutHistory();
  renderStats();
  renderCalendar();
  showToast('Day deleted');
}

function clearAllHistory() {
  if (!confirm('Delete ALL workout and meal history? This cannot be undone.')) return;
  localStorage.removeItem('gl_logs');
  localStorage.removeItem('gl_checked');
  localStorage.removeItem('gl_setlogs');
  // Remove all meal logs
  Object.keys(localStorage).forEach(function(k){
    if (k.startsWith('gl_meals_') || k.startsWith('gl_wk_')) {
      localStorage.removeItem(k);
    }
  });
  renderWorkoutHistory();
  renderStats();
  renderCalendar();
  renderToday();
  showToast('All history cleared');
}

function toggleHistoryCard(date, hdr) {
  var body   = hdr.nextElementSibling;
  var isOpen = body.classList.contains('open');
  document.querySelectorAll('.history-date-body.open').forEach(function(b) { b.classList.remove('open'); });
  if (!isOpen) { body.classList.add('open'); openHistoryDate = date; }
  else          { openHistoryDate = null; }
}

// ════════════════════════════════════════════════════════════════
//  STATS
// ════════════════════════════════════════════════════════════════
function renderStats() {
  var logs    = getLogs();
  var checked = getChecked();
  var now     = new Date();

  var totalLogs    = logs.length;
  var uniqueDays   = new Set(logs.map(function(l){ return l.date; })).size;
  var totalChecked = Object.values(checked).filter(Boolean).length;

  // This week workout completion %
  var dow = now.getDay();
  var daysFromMon = (dow === 0) ? 6 : dow - 1;
  var weekStart = new Date(now);
  weekStart.setDate(now.getDate() - daysFromMon);
  weekStart.setHours(0,0,0,0);

  var weekPctSum = 0, weekDays = 0;
  for (var d = new Date(weekStart); d <= now; d.setDate(d.getDate() + 1)) {
    var wd = d.getDay();
    if (wd === 0) continue;
    var s = SCHEDULE[wd];
    if (!s || !s.sections.length) continue;
    weekDays++;
    var ds  = localDateStr(d);
    var tot = s.sections.reduce(function(n,sec){ return n + sec.exercises.length; }, 0);
    var dn  = Object.keys(checked).filter(function(k){ return k.endsWith('_'+ds) && checked[k]; }).length;
    weekPctSum += tot ? (dn / tot) * 100 : 0;
  }
  var weekPct = weekDays ? Math.round(weekPctSum / weekDays) : 0;

  // Avg meal 7 days
  var mealSum = 0;
  for (var i = 0; i < 7; i++) {
    var dd = new Date(now);
    dd.setDate(now.getDate() - i);
    mealSum += calcMealPct(getMealLog(dlocalDateStr(d)));
  }
  var avgMeal = Math.round(mealSum / 7);

  // Streak: consecutive days workout >= 50% (Sunday = free pass)
  var streak = 0;
  for (var j = 0; j < 365; j++) {
    var sd  = new Date(now);
    sd.setDate(now.getDate() - j);
    var sdow = sd.getDay();
    if (sdow === 0) { streak++; continue; }
    var ss = SCHEDULE[sdow];
    if (!ss || !ss.sections.length) { streak++; continue; }
    var sds  = slocalDateStr(d);
    var stot = ss.sections.reduce(function(n,sec){ return n + sec.exercises.length; }, 0);
    var sdn  = Object.keys(checked).filter(function(k){ return k.endsWith('_'+sds) && checked[k]; }).length;
    var spct = stot ? (sdn / stot) * 100 : 0;
    if (spct >= 50) streak++;
    else break;
  }

  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card"><div class="stat-num">' + totalLogs    + '</div><div class="stat-label">Exercises logged</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + uniqueDays   + '</div><div class="stat-label">Days trained</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + totalChecked + '</div><div class="stat-label">Sets ticked off</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + weekPct      + '%</div><div class="stat-label">This week</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + avgMeal      + '%</div><div class="stat-label">Avg meal 7d</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + streak       + '</div><div class="stat-label">Day streak</div></div>';

  var counts = {};
  logs.forEach(function(l){ counts[l.exercise] = (counts[l.exercise] || 0) + 1; });
  var sorted = Object.entries(counts).sort(function(a,b){ return b[1]-a[1]; }).slice(0, 8);
  var max    = sorted.length ? sorted[0][1] : 1;
  var chart  = document.getElementById('barChart');
  if (!sorted.length) { chart.innerHTML = '<div style="color:var(--muted);font-size:0.8rem">No data yet.</div>'; return; }
  chart.innerHTML = sorted.map(function(e) {
    return '<div class="bar-row">' +
      '<div class="bar-label" title="' + e[0] + '">' + e[0] + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + Math.round(e[1]/max*100) + '%"></div></div>' +
      '<div class="bar-val">' + e[1] + '×</div></div>';
  }).join('');
}

// ════════════════════════════════════════════════════════════════
//  MEALS
// ════════════════════════════════════════════════════════════════
function calcMealPct(mealLog) {
  var count = 0;
  MEALS.forEach(function(m) {
    var e = mealLog[m.id];
    if (e && e.eaten) count += (m.type === 'supplement') ? 0.5 : 1;
  });
  return Math.round((count / 8) * 100);
}

function getTodayTotals(mealLog) {
  var kcal=0, p=0, c=0, f=0;
  MEALS.forEach(function(m) {
    var e = mealLog[m.id];
    if (e && e.eaten) {
      // Use snapshot stored at eat-time if available (custom or original)
      if (e.snap) {
        kcal += e.snap.kcal || 0;
        p    += e.snap.p    || 0;
        c    += e.snap.c    || 0;
        f    += e.snap.f    || 0;
      } else {
        // Legacy entries without snapshot — use getMealMacros
        var mac = getMealMacros(m);
        kcal += mac.kcal; p += mac.p; c += mac.c; f += mac.f;
      }
    }
  });
  return { kcal:kcal, p:p, c:c, f:f };
}

function renderMeals() {
  var mealLog = getMealLog(activeLogDate);
  var totals  = getTodayTotals(mealLog);
  renderMacroBars(totals);

  var list = document.getElementById('mealsList');
  list.innerHTML = '';
  MEALS.forEach(function(m) {
    var entry = mealLog[m.id] || {};
    if (m.type === 'supplement') list.appendChild(buildSuppCard(m, entry));
    else                         list.appendChild(buildMealCard(m, entry));
  });

  var sumDiv = document.createElement('div');
  sumDiv.id  = 'dailySummaryEl';
  list.appendChild(sumDiv);
  renderDailySummary(totals, mealLog);
}

function renderMacroBars(totals) {
  var bars = [
    { label:'Calories', val:totals.kcal, goal:GOALS.kcal, unit:'kcal' },
    { label:'Protein',  val:totals.p,    goal:GOALS.p,    unit:'g' },
    { label:'Carbs',    val:totals.c,    goal:GOALS.c,    unit:'g' },
    { label:'Fat',      val:totals.f,    goal:GOALS.f,    unit:'g' }
  ];
  document.getElementById('macroBarsSection').innerHTML = bars.map(function(b) {
    var pct  = Math.min((b.val / b.goal) * 100, 100);
    var over = b.val > b.goal;
    return '<div class="macro-bar-row">' +
      '<div class="macro-bar-label">' + b.label + '</div>' +
      '<div class="macro-bar-track"><div class="macro-bar-fill' + (over ? ' over' : '') + '" style="width:' + pct + '%"></div></div>' +
      '<div class="macro-bar-nums">' + Math.round(b.val) + ' / ' + b.goal + b.unit + '</div>' +
    '</div>';
  }).join('');
}

function buildMealCard(m, entry) {
  var isEaten = entry && entry.eaten;
  var mac     = getMealMacros(m);
  var card    = document.createElement('div');
  card.className    = 'meal-card';
  card.dataset.mealId = m.id;

  var ingrHtml = '';
  mac.ingredients.forEach(function(ing) {
    var w    = parseFloat(ing.weight) || null;
    var name = ing.name || (ing.name || '');
    var display = name;
    if (w !== null && ing.kcal100 !== undefined) {
      var ik = Math.round((w/100)*(parseFloat(ing.kcal100)||0));
      var ip = Math.round((w/100)*(parseFloat(ing.p100)||0)*10)/10;
      var ic = Math.round((w/100)*(parseFloat(ing.c100)||0)*10)/10;
      var iF = Math.round((w/100)*(parseFloat(ing.f100)||0)*10)/10;
      ingrHtml += '<div class="ingr-line">' +
        '<div class="ingr-name">' + display + (w ? ' · ' + w + 'g' : '') + '</div>' +
        '<div class="ingr-macros">' + ik + 'kcal | ' + ip + 'g P | ' + ic + 'g C | ' + iF + 'g F</div>' +
        '</div>';
    } else {
      var ik2 = ing.kcal !== undefined ? ing.kcal : '';
      var ip2 = ing.p    !== undefined ? ing.p    : '';
      var ic2 = ing.c    !== undefined ? ing.c    : '';
      var if2 = ing.f    !== undefined ? ing.f    : '';
      ingrHtml += '<div class="ingr-line">' +
        '<div class="ingr-name">' + (ing.name||display) + '</div>' +
        '<div class="ingr-macros">' + ik2 + 'kcal | ' + ip2 + 'g P | ' + ic2 + 'g C | ' + if2 + 'g F</div>' +
        '</div>';
    }
  });

  var isCustom = (function() {
    var cm = getCustomMeals()[m.id];
    return cm && cm.ingredients && cm.ingredients.length > 0;
  })();

  var creatineHtml = m.creatineBadge ?
    '<div style="padding:0 0.85rem 0.35rem"><span class="creatine-badge">5g Creatine · 0 kcal</span></div>' : '';

  var actionHtml = isEaten ?
    '<div class="eaten-row"><div class="eaten-label">Eaten at ' + entry.eatenAt + ' ✓</div>' +
      '<span class="undo-link" onclick="undoEaten(' + m.id + ')">undo</span></div>' :
    '<button class="mark-eaten-btn" onclick="markEaten(' + m.id + ')">Mark Eaten</button>';

  card.innerHTML =
    '<div class="meal-card-header" onclick="this.closest(\'.meal-card\').classList.toggle(\'expanded\')">' +
      '<div style="flex:1"><div class="meal-card-title">' + m.name +
        (isCustom ? '<span class="meal-custom-badge">edited</span>' : '') +
      '</div></div>' +
      '<div class="meal-card-time">' + m.time + '</div>' +
      '<div class="meal-chevron">&#9660;</div>' +
    '</div>' +
    '<div class="meal-macro-line">' + Math.round(mac.kcal) + ' kcal | ' + mac.p + 'g P | ' + mac.c + 'g C | ' + mac.f + 'g F</div>' +
    (m.note ? '<div class="meal-note-line">' + m.note + '</div>' : '') +
    creatineHtml +
    (mac.ingredients && mac.ingredients.length ? '<div class="meal-ingredients">' + ingrHtml + '</div>' : '') +
    '<div class="meal-action-row">' +
      '<button class="meal-edit-btn" onclick="openMealEditor(' + m.id + ')">Edit meal</button>' +
      actionHtml +
    '</div>';
  return card;
}

function buildSuppCard(m, entry) {
  var isEaten = entry && entry.eaten;
  var div     = document.createElement('div');
  div.className    = 'supp-card';
  div.dataset.mealId = m.id;
  div.innerHTML =
    '<div class="supp-header">' +
      '<span class="supp-badge">Supplement</span>' +
      '<span class="supp-name">' + m.name + '</span>' +
      '<span class="supp-dose">' + m.dose + '</span>' +
    '</div>' +
    '<div class="supp-macros">' + m.kcal + ' kcal | ' + m.p + 'g P | ' + m.c + 'g C | ' + m.f + 'g F</div>' +
    '<div class="supp-note">' + m.note + '</div>' +
    '<div class="supp-action">' +
      (isEaten ?
        '<button class="supp-btn taken" disabled>Taken at ' + entry.eatenAt + ' ✓</button>' +
        '<span class="undo-link" onclick="undoEaten(' + m.id + ')">undo</span>' :
        '<button class="supp-btn" onclick="markEaten(' + m.id + ')">Mark as Taken</button>') +
    '</div>';
  return div;
}

// ════════════════════════════════════════════════════════════════
//  MEAL EDITOR
// ════════════════════════════════════════════════════════════════
function openMealEditor(mealId) {
  editorMealId = mealId;
  var meal     = MEALS.find(function(m){ return m.id === mealId; });
  if (!meal) return;

  var mac = getMealMacros(meal);
  var custom = getCustomMeals()[mealId];

  // Build editorRows from custom or default ingredients
  editorRows = [];
  if (custom && custom.ingredients && custom.ingredients.length) {
    editorRows = custom.ingredients.map(function(ing) {
      return { name: ing.name, weight: ing.weight,
               kcal100: ing.kcal100, p100: ing.p100,
               c100: ing.c100,       f100: ing.f100 };
    });
  } else if (meal.ingredients) {
    meal.ingredients.forEach(function(ing) {
      // Try to match to FOOD_DB
      var dbKey  = Object.keys(FOOD_DB).find(function(k){
        return ing.name.toLowerCase().indexOf(k.toLowerCase()) !== -1 ||
               k.toLowerCase().indexOf(ing.name.split(' ')[0].toLowerCase()) !== -1;
      });
      var db = dbKey ? FOOD_DB[dbKey] : null;
      // Extract weight from name string e.g. "Chicken breast 120g"
      var wMatch = ing.name.match(/(\d+(?:\.\d+)?)\s*g/);
      var weight = wMatch ? parseFloat(wMatch[1]) : '';
      if (db) {
        editorRows.push({ name: dbKey, weight: weight,
                          kcal100: db.kcal, p100: db.p,
                          c100: db.c,       f100: db.f });
      } else {
        // No DB match — store as freeform with per-100g back-calculated
        var w100 = weight ? weight : 100;
        editorRows.push({ name: ing.name, weight: weight,
                          kcal100: weight ? Math.round((ing.kcal / weight) * 100) : ing.kcal,
                          p100:    weight ? Math.round((ing.p    / weight) * 100 * 10) / 10 : ing.p,
                          c100:    weight ? Math.round((ing.c    / weight) * 100 * 10) / 10 : ing.c,
                          f100:    weight ? Math.round((ing.f    / weight) * 100 * 10) / 10 : ing.f });
      }
    });
  }

  var panel  = document.getElementById('mealEditorPanel');
  var titleEl = document.getElementById('mealEditorTitle');
  titleEl.textContent = meal.name;

  renderEditorRows();
  recalcEditorTotals();
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeMealEditor() {
  document.getElementById('mealEditorPanel').classList.remove('open');
  document.body.style.overflow = '';
}

function renderEditorRows() {
  var cont = document.getElementById('editorIngredients');
  // Build datalist options
  var dlOpts = Object.keys(FOOD_DB).map(function(k){
    return '<option value="' + k + '">';
  }).join('');

  cont.innerHTML =
    '<datalist id="foodDbList">' + dlOpts + '</datalist>' +
    editorRows.map(function(row, i) {
      return buildEditorRow(row, i);
    }).join('');
}

function buildEditorRow(row, i) {
  var kcalCalc = row.weight && row.kcal100 ? Math.round((parseFloat(row.weight)/100)*parseFloat(row.kcal100)) : '—';
  var pCalc    = row.weight && row.p100    ? Math.round((parseFloat(row.weight)/100)*parseFloat(row.p100)*10)/10 : '—';
  var cCalc    = row.weight && row.c100    ? Math.round((parseFloat(row.weight)/100)*parseFloat(row.c100)*10)/10 : '—';
  var fCalc    = row.weight && row.f100    ? Math.round((parseFloat(row.weight)/100)*parseFloat(row.f100)*10)/10 : '—';
  return '<div class="editor-row" id="erow-' + i + '">' +
    '<div class="editor-row-top">' +
      '<input class="editor-food-input" list="foodDbList" placeholder="Search food..." ' +
        'value="' + (row.name||'') + '" ' +
        'oninput="onEditorFoodInput(' + i + ', this.value)" ' +
        'onchange="onEditorFoodChange(' + i + ', this.value)">' +
      '<button class="editor-remove-btn" onclick="removeEditorRow(' + i + ')">&#10005;</button>' +
    '</div>' +
    '<div class="editor-row-mid">' +
      '<div class="editor-weight-wrap">' +
        '<input class="editor-weight-input" type="number" min="0" step="1" placeholder="grams" ' +
          'value="' + (row.weight||'') + '" ' +
          'oninput="onEditorWeightInput(' + i + ', this.value)">' +
        '<span class="editor-weight-unit">g</span>' +
      '</div>' +
      '<div class="editor-per100">' +
        (row.kcal100 ? 'Per 100g: ' + row.kcal100 + 'kcal · ' + row.p100 + 'P · ' + row.c100 + 'C · ' + row.f100 + 'F' : 'Select a food to see nutrition') +
      '</div>' +
    '</div>' +
    '<div class="editor-row-calc">' +
      '<span class="editor-calc-val">' + kcalCalc + 'kcal</span>' +
      '<span class="editor-calc-val">' + pCalc + 'g P</span>' +
      '<span class="editor-calc-val">' + cCalc + 'g C</span>' +
      '<span class="editor-calc-val">' + fCalc + 'g F</span>' +
    '</div>' +
  '</div>';
}

function onEditorFoodInput(i, val) {
  editorRows[i].name = val;
  var db = FOOD_DB[val];
  if (db) {
    editorRows[i].kcal100 = db.kcal;
    editorRows[i].p100    = db.p;
    editorRows[i].c100    = db.c;
    editorRows[i].f100    = db.f;
  }
  refreshEditorRow(i);
  recalcEditorTotals();
}

function onEditorFoodChange(i, val) {
  editorRows[i].name = val;
  var db = FOOD_DB[val];
  if (db) {
    editorRows[i].kcal100 = db.kcal;
    editorRows[i].p100    = db.p;
    editorRows[i].c100    = db.c;
    editorRows[i].f100    = db.f;
  }
  refreshEditorRow(i);
  recalcEditorTotals();
}

function onEditorWeightInput(i, val) {
  editorRows[i].weight = parseFloat(val) || '';
  refreshEditorRow(i);
  recalcEditorTotals();
}

function refreshEditorRow(i) {
  var row  = editorRows[i];
  var el   = document.getElementById('erow-' + i);
  if (!el) return;
  var kcalCalc = row.weight && row.kcal100 ? Math.round((parseFloat(row.weight)/100)*parseFloat(row.kcal100)) : '—';
  var pCalc    = row.weight && row.p100    ? Math.round((parseFloat(row.weight)/100)*parseFloat(row.p100)*10)/10 : '—';
  var cCalc    = row.weight && row.c100    ? Math.round((parseFloat(row.weight)/100)*parseFloat(row.c100)*10)/10 : '—';
  var fCalc    = row.weight && row.f100    ? Math.round((parseFloat(row.weight)/100)*parseFloat(row.f100)*10)/10 : '—';
  el.querySelector('.editor-per100').textContent = row.kcal100 ?
    'Per 100g: ' + row.kcal100 + 'kcal · ' + row.p100 + 'P · ' + row.c100 + 'C · ' + row.f100 + 'F' :
    'Select a food to see nutrition';
  var calcs = el.querySelectorAll('.editor-calc-val');
  if (calcs[0]) calcs[0].textContent = kcalCalc + 'kcal';
  if (calcs[1]) calcs[1].textContent = pCalc + 'g P';
  if (calcs[2]) calcs[2].textContent = cCalc + 'g C';
  if (calcs[3]) calcs[3].textContent = fCalc + 'g F';
}

function recalcEditorTotals() {
  var kcal=0, p=0, c=0, f=0;
  editorRows.forEach(function(row) {
    var w = parseFloat(row.weight) || 0;
    if (w && row.kcal100 !== undefined) {
      kcal += (w/100) * parseFloat(row.kcal100);
      p    += (w/100) * parseFloat(row.p100 || 0);
      c    += (w/100) * parseFloat(row.c100 || 0);
      f    += (w/100) * parseFloat(row.f100 || 0);
    }
  });
  var el = document.getElementById('editorTotals');
  if (el) {
    el.innerHTML =
      '<span class="ed-total-val">' + Math.round(kcal) + 'kcal</span>' +
      '<span class="ed-total-val">' + Math.round(p*10)/10 + 'g P</span>' +
      '<span class="ed-total-val">' + Math.round(c*10)/10 + 'g C</span>' +
      '<span class="ed-total-val">' + Math.round(f*10)/10 + 'g F</span>';
  }
}

function addEditorRow() {
  editorRows.push({ name:'', weight:'', kcal100:'', p100:'', c100:'', f100:'' });
  renderEditorRows();
  recalcEditorTotals();
  // Scroll to bottom of ingredient list
  var cont = document.getElementById('editorIngredients');
  cont.scrollTop = cont.scrollHeight;
}

function removeEditorRow(i) {
  editorRows.splice(i, 1);
  renderEditorRows();
  recalcEditorTotals();
}

function saveMealEdits() {
  var validRows = editorRows.filter(function(r){ return r.name && r.weight; });
  var cm = getCustomMeals();
  cm[editorMealId] = { ingredients: validRows };
  setCustomMeals(cm);

  // If this meal is already marked eaten today, update the stored snapshot
  var date = activeLogDate;
  var ml   = getMealLog(date);
  var entry = ml[editorMealId];
  if (entry && entry.eaten) {
    var meal = MEALS.find(function(m){ return m.id === editorMealId; });
    if (meal) {
      var snap = getMealMacros(meal);
      entry.snap = { kcal: snap.kcal, p: snap.p, c: snap.c, f: snap.f };
      ml[editorMealId] = entry;
      setMealLog(date, ml);
    }
  }

  closeMealEditor();
  renderMeals();
  showToast('Meal updated ✓');
}

function resetMealToDefault() {
  var cm = getCustomMeals();
  delete cm[editorMealId];
  setCustomMeals(cm);
  closeMealEditor();
  renderMeals();
  showToast('Reset to default');
}

function markEaten(mealId) {
  var date = activeLogDate;
  var ml   = getMealLog(date);
  var now  = new Date();
  var hh   = String(now.getHours()).padStart(2,'0');
  var mm   = String(now.getMinutes()).padStart(2,'0');
  var meal = MEALS.find(function(m){ return m.id === mealId; });
  var snap = meal ? getMealMacros(meal) : { kcal:0, p:0, c:0, f:0 };
  // Store snapshot of macros at time of eating — this is what gets tracked
  ml[mealId] = {
    eaten:   true,
    eatenAt: hh + ':' + mm,
    snap:    { kcal: snap.kcal, p: snap.p, c: snap.c, f: snap.f }
  };
  setMealLog(date, ml);
  renderMeals();
  showToast('Logged ✓');
}

function undoEaten(mealId) {
  var date = activeLogDate;
  var ml   = getMealLog(date);
  ml[mealId] = { eaten:false };
  setMealLog(date, ml);
  renderMeals();
  showToast('Undone');
}

function renderDailySummary(totals, mealLog) {
  var el = document.getElementById('dailySummaryEl');
  if (!el) return;
  var kcal = totals.kcal, p = totals.p, c = totals.c, f = totals.f;
  var remaining = GOALS.kcal - kcal;
  var hour = new Date().getHours();

  var eatenCount = 0;
  MEALS.forEach(function(m) {
    var e = mealLog[m.id];
    if (e && e.eaten) eatenCount += (m.type === 'supplement') ? 0.5 : 1;
  });

  var status = '';
  if (eatenCount >= 8)                          status = 'Perfect day — full nutrition hit';
  else if (p >= 150)                            status = 'Protein on track';
  else if (p < 100)                             status = 'Eat more protein today';
  else if (kcal < 1500 && hour >= 18)           status = 'You are under — eat your remaining meals';
  else if (kcal >= 2709)                        status = 'At target — you are done';
  else                                          status = 'Keep going — ' + Math.round(remaining) + ' kcal remaining';

  el.className = 'daily-summary';
  el.innerHTML =
    '<div class="daily-summary-title">Daily Summary</div>' +
    '<div class="daily-cal-big">' + Math.round(kcal) + '</div>' +
    '<div class="daily-cal-goal">kcal consumed / 2709 goal · ' +
      (remaining >= 0 ? Math.round(remaining) + ' remaining' : Math.round(-remaining) + ' over target') +
    '</div>' +
    '<div class="daily-status">' + status + '</div>' +
    '<div class="daily-macro-row">' +
      '<div class="daily-macro-item">Protein: <span>' + Math.round(p) + 'g / 165g</span></div>' +
      '<div class="daily-macro-item">Carbs: <span>'   + Math.round(c) + 'g / 381g</span></div>' +
      '<div class="daily-macro-item">Fat: <span>'     + Math.round(f) + 'g / 73g</span></div>' +
    '</div>';
}

//  DATE PICKER MODAL
// ════════════════════════════════════════════════════════════════
var dpYear = new Date().getFullYear();
var dpMonth = new Date().getMonth();

function openDateModal() {
  dpYear  = new Date().getFullYear();
  dpMonth = new Date().getMonth();
  renderDatePicker();
  document.getElementById('dpModalOverlay').classList.add('open');
}

function closeDateModal() {
  document.getElementById('dpModalOverlay').classList.remove('open');
}

function dpNav(dir) {
  dpMonth += dir;
  if (dpMonth > 11) { dpMonth = 0; dpYear++; }
  if (dpMonth < 0)  { dpMonth = 11; dpYear--; }
  renderDatePicker();
}

function renderDatePicker() {
  var MONS = ['January','February','March','April','May','June',
              'July','August','September','October','November','December'];
  document.getElementById('dpMonthLabel').textContent = MONS[dpMonth] + ' ' + dpYear;
  var grid     = document.getElementById('dpGrid');
  var todayStr = todayKey();
  var firstDay = new Date(dpYear, dpMonth, 1).getDay();
  var offset   = (firstDay === 0) ? 6 : firstDay - 1;
  var daysInMon = new Date(dpYear, dpMonth + 1, 0).getDate();
  var html = '';
  for (var i = 0; i < offset; i++) html += '<div class="dp-cell dp-empty"></div>';
  for (var d = 1; d <= daysInMon; d++) {
    var mo  = String(dpMonth + 1).padStart(2, '0');
    var dy  = String(d).padStart(2, '0');
    var ds  = dpYear + '-' + mo + '-' + dy;
    var cls = 'dp-cell';
    if (ds === todayStr)      cls += ' dp-today';
    if (ds === activeLogDate) cls += ' dp-selected';
    html += '<div class="' + cls + '" onclick="pickDate(\'' + ds + '\')">' + d + '</div>';
  }
  grid.innerHTML = html;
}

function pickDate(dateStr) {
  closeDateModal();
  setActiveLogDate(dateStr);
}

function jumpToday() {
  closeDateModal();
  setActiveLogDate(todayKey());
}

//  CALENDAR
// ════════════════════════════════════════════════════════════════
var MONTH_NAMES = ['January','February','March','April','May','June',
                   'July','August','September','October','November','December'];
var DAY_LONG    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MON_LONG    = ['January','February','March','April','May','June',
                   'July','August','September','October','November','December'];

function calNav(dir) {
  calViewMonth += dir;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  if (calViewMonth < 0)  { calViewMonth = 11; calViewYear--; }
  calSelectedDate = null;
  document.getElementById('calDetailPanel').classList.remove('open');
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = MONTH_NAMES[calViewMonth] + ' ' + calViewYear;

  var grid    = document.getElementById('calGrid');
  grid.innerHTML = '';

  var today    = new Date();
  var todayStr = todayKey();
  var checked  = getChecked();

  var firstDay   = new Date(calViewYear, calViewMonth, 1);
  var startDow   = firstDay.getDay(); // 0=Sun
  var offsetCells = (startDow === 0) ? 6 : startDow - 1; // Mon-based
  var daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();

  // Empty leading cells
  for (var e = 0; e < offsetCells; e++) {
    var empty = document.createElement('div');
    empty.className = 'cal-cell empty-cell';
    grid.appendChild(empty);
  }

  for (var day = 1; day <= daysInMonth; day++) {
    var cellDate = new Date(calViewYear, calViewMonth, day);
    var dateStr  = localDateStr(cellDate);
    var cellDow  = cellDate.getDay();
    var isToday  = (dateStr === todayStr);
    var isFuture = (dateStr > todayStr);
    var isSunday = (cellDow === 0);

    var cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (isToday)  cell.classList.add('today-cell');
    if (isFuture) cell.classList.add('future-cell');
    if (calSelectedDate === dateStr) cell.classList.add('selected-cell');
    cell.dataset.date = dateStr;
    if (!isFuture) cell.onclick = (function(ds, ce) { return function() { toggleCalCell(ds, ce); }; })(dateStr, cell);

    // Workout pct — use getSessionForDate so custom workouts count too
    var workoutPct = 0;
    if (!isFuture && !isSunday) {
      var sess = getSessionForDate(dateStr);
      if (sess && sess.sections.length) {
        var tot = sess.sections.reduce(function(n, sec){ return n + sec.exercises.length; }, 0);
        var dn  = Object.keys(checked).filter(function(k){ return k.endsWith('_' + dateStr) && checked[k]; }).length;
        workoutPct = tot ? Math.round((dn / tot) * 100) : 0;
      }
    }

    // Meal pct
    var mealPct = 0;
    if (!isFuture) {
      mealPct = calcMealPct(getMealLog(dateStr));
    }

    // Background tint
    if (!isFuture) {
      var combined = isSunday ? mealPct : Math.round((workoutPct + mealPct) / 2);
      if      (combined >= 80) cell.style.background = 'rgba(200,240,60,0.15)';
      else if (combined >= 50) cell.style.background = 'rgba(200,240,60,0.08)';
      else if (combined > 0)   cell.style.background = 'rgba(255,90,54,0.08)';
    }

    var inner = '<div class="cal-date-num">' + day + '</div>';
    if (isSunday) inner += '<div class="cal-rest-label">REST</div>';

    // Always show bars for past + today so the structure is visible
    if (!isFuture) {
      inner += '<div class="cal-mini-bars">';
      if (!isSunday) {
        inner += '<div class="cal-mini-bar workout" style="--bar-w:' + workoutPct + '%"></div>';
      }
      inner += '<div class="cal-mini-bar meal" style="--bar-w:' + mealPct + '%"></div>';
      inner += '</div>';
    }

    cell.innerHTML = inner;
    grid.appendChild(cell);
  }
}

function toggleCalCell(dateStr, cellEl) {
  var panel = document.getElementById('calDetailPanel');

  if (calSelectedDate === dateStr) {
    calSelectedDate = null;
    panel.classList.remove('open');
    document.querySelectorAll('.cal-cell.selected-cell').forEach(function(c) { c.classList.remove('selected-cell'); });
    return;
  }

  calSelectedDate = dateStr;
  document.querySelectorAll('.cal-cell.selected-cell').forEach(function(c) { c.classList.remove('selected-cell'); });
  cellEl.classList.add('selected-cell');

  var d       = new Date(dateStr + 'T12:00:00');
  var heading = DAY_LONG[d.getDay()] + ', ' + d.getDate() + ' ' + MON_LONG[d.getMonth()] + ' ' + d.getFullYear();
  var cellDow = d.getDay();
  var isSun   = (cellDow === 0);
  var checked = getChecked();
  var session = SCHEDULE[cellDow];

  // Build workout section
  var workoutHtml = '';
  if (isSun || !session || !session.sections.length) {
    workoutHtml = '<div class="cal-detail-muted">Rest day</div>';
  } else {
    var tot  = session.sections.reduce(function(n,s){ return n + s.exercises.length; }, 0);
    var doneKeys = Object.keys(checked).filter(function(k){ return k.endsWith('_'+dateStr) && checked[k]; });
    var dn   = doneKeys.length;
    var pct  = tot ? Math.round((dn / tot) * 100) : 0;
    var doneNames = doneKeys.map(function(k){ return k.replace('_' + dateStr, ''); });
    workoutHtml =
      '<div style="margin-bottom:0.35rem"><span class="type-badge ' + session.type + '" style="font-size:0.55rem">' + session.name + '</span></div>' +
      '<div class="cal-detail-row">Exercises done: ' + dn + ' / ' + tot + ' · ' + pct + '%</div>' +
      '<div style="margin-top:0.3rem">' +
      session.sections.flatMap(function(s){ return s.exercises; }).map(function(ex) {
        var done = doneNames.indexOf(ex.name) !== -1;
        return '<div class="cal-detail-muted">' + (done ? '✓' : '○') + ' ' + ex.name + '</div>';
      }).join('') + '</div>';
  }

  // Build meals section
  var mealLog  = getMealLog(dateStr);
  var mealKcal = 0, mealP = 0, mealC = 0, mealF = 0, eatenCount = 0;
  MEALS.forEach(function(m) {
    var e = mealLog[m.id];
    if (e && e.eaten) {
      mealKcal += m.kcal; mealP += m.p; mealC += m.c; mealF += m.f;
      eatenCount += (m.type === 'supplement') ? 0.5 : 1;
    }
  });

  var hasData = !isSun && doneKeys && Object.keys(checked).some(function(k){ return k.endsWith('_'+dateStr) && checked[k]; }) || eatenCount > 0;

  var content = '<div class="cal-detail-date">' + heading + '</div><div class="cal-divider"></div>';
  if (!hasData) {
    content += '<div class="cal-detail-muted">No data recorded for this day</div>';
  } else {
    content +=
      '<div class="cal-sec-title">Workout</div>' + workoutHtml +
      '<div class="cal-sec-title" style="margin-top:0.7rem">Meals</div>' +
      '<div class="cal-detail-row">Meals eaten: ' + eatenCount + ' / 8</div>' +
      '<div class="cal-detail-row">Total: ' + Math.round(mealKcal) + ' kcal consumed</div>' +
      '<div class="cal-detail-muted">Protein: ' + Math.round(mealP) + 'g | Carbs: ' + Math.round(mealC) + 'g | Fat: ' + Math.round(mealF) + 'g</div>';
  }

  panel.innerHTML = content;
  panel.classList.add('open');
  setTimeout(function() { panel.scrollIntoView({ behavior:'smooth', block:'nearest' }); }, 50);
}
